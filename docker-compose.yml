services:
  db:
    # arm64-native PostGIS (official postgis/postgis is amd64-only and emulates on Apple Silicon).
    # imresamu/postgis tracks upstream PostGIS and publishes linux/arm64 + linux/amd64.
    image: imresamu/postgis:16-3.4
    environment:
      POSTGRES_DB: netatlas
      POSTGRES_USER: netatlas
      POSTGRES_PASSWORD: netatlas
    ports: ["5432:5432"]
    volumes: ["./backend/db/data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U netatlas"]
      interval: 5s
      timeout: 3s
      retries: 10
